<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gartic Chat Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #1e2538;          /* نفس لون خلفية الصور بالملي */
            --bg-card: #283046;          /* لون الكروت الداخلي */
            --primary-yellow: #ffc107;   /* أصفر زر Play المريح */
            --btn-blue: #2196f3;         /* أزرق زر الرفع */
            --btn-green: #28c76f;        /* أخضر زر الـ Join */
            --text-white: #ffffff;
            --text-muted: #8c94a5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex: 1;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- 1. واجهة التسجيل المحدثة لتطابق الصورة --- */
        .brand-title {
            font-size: 42px;
            font-weight: 800;
            color: var(--primary-yellow);
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .brand-subtitle {
            color: var(--text-muted);
            font-size: 16px;
            text-align: center;
            margin-bottom: 30px;
        }

        .main-auth-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .avatar-area {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #151a26;
            object-fit: cover;
        }

        .avatar-buttons-row {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            transition: 0.2s;
        }

        .btn-random { background: #3d465e; }
        .btn-upload { background: var(--btn-blue); }

        .input-title {
            text-align: left;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .name-input-field {
            width: 100%;
            background: #1e2538;
            border: 1px solid #3d465e;
            padding: 14px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }

        .btn-play {
            background: var(--primary-yellow);
            color: #111;
            font-weight: 800;
            font-size: 18px;
            padding: 14px;
            width: 100%;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c79600;
            transition: 0.1s;
        }

        .btn-play:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .divider {
            color: var(--text-muted);
            font-size: 12px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #3d465e; }

        .btn-gmail {
            background: #2d3548;
            width: 100%;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* --- 2. واجهة الرومات لتطابق الصورة --- */
        .rooms-header {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rooms-list-wrapper {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .room-row-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .room-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-title-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
        }

        .room-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .room-category-tag {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
        }

        .btn-join {
            background: var(--btn-green);
            color: white;
            font-weight: 700;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            font-size: 16px;
        }

        /* --- 3. واجهة الشات المتطابقة --- */
        .chat-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 0;
            background: var(--bg-dark);
        }

        .chat-top-navbar {
            background: var(--bg-card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.15);
        }

        .players-dropdown {
            background: #1e2538;
            padding: 8px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .players-count-badge {
            background: var(--primary-yellow);
            color: black;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .chat-messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center; /* لضمان توسط كبسولات النظام */
        }

        /* كبسولة الدخول والخروج المنتظرة مثل الصورة تماماً */
        .status-capsule-chip {
            background: rgba(33, 150, 243, 0.12);
            color: #64b5f6;
            border: 1px solid rgba(33, 150, 243, 0.25);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            animation: fadeIn 0.3s ease;
            margin: 5px 0;
            display: inline-block;
        }

        .status-capsule-chip.leave {
            background: rgba(239, 83, 80, 0.12);
            color: #ef5350;
            border: 1px solid rgba(239, 83, 80, 0.25);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* صندوق الشات والارسال المتطابق */
        .sticky-bottom-dock {
            padding: 15px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--bg-dark);
        }

        .message-input-node {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid #3d465e;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .btn-send-message {
            background: var(--btn-blue);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }

        /* لودر الجيميل */
        .gmail-loader-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 40px; height: 40px;
            border-radius: 50%;
            border-left-color: var(--primary-yellow);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="gmail-loader-overlay" id="gmailLoader">
        <div style="text-align: center;">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 600;">Sign in with Google...</p>
        </div>
    </div>

    <div id="authScreen" class="screen active">
        <h1 class="brand-title">Gartic Chat</h1>
        <p class="brand-subtitle">Join rooms and chat with friends</p>

        <div class="main-auth-card">
            <div class="avatar-area">
                <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffc107'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>" class="avatar-img" id="userAvatarPreview">
            </div>

            <div class="avatar-buttons-row">
                <button class="btn-action btn-random" onclick="generateRandomAvatar()"><i class="fa-solid fa-shuffle"></i> Random</button>
                <button class="btn-action btn-upload" onclick="document.getElementById('fileAttachmentInput').click()"><i class="fa-solid fa-upload"></i> Upload</button>
            </div>
            <input type="file" id="fileAttachmentInput" accept="image/*" style="display:none;" onchange="handleImageFile(event)">

            <div class="input-title">Your Name</div>
            <input type="text" id="usernameInputNode" class="name-input-field" placeholder="Type your name...">

            <button class="btn-play" onclick="triggerLogin('normal')">Play!</button>
            
            <div class="divider">or</div>

            <button class="btn-gmail" onclick="triggerLogin('gmail')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="16"> Sign in with Google
            </button>
        </div>
    </div>

    <div id="roomsScreen" class="screen">
        <div class="rooms-header">
            <h2 style="font-size: 28px; font-weight: 800;">Rooms</h2>
            <span style="color: var(--text-muted);" id="roomCounterMeta">3 rooms available</span>
        </div>

        <div class="rooms-list-wrapper">
            <div class="room-row-card">
                <div class="room-row-top">
                    <div class="room-title-badge">
                        <div class="room-dot" style="background: #28c76f;"></div>
                        <span>Animals</span>
                    </div>
                    <div class="room-category-tag" style="color: #28c76f;">Animals</div>
                </div>
                <div style="color: var(--text-muted); font-size: 14px;"><i class="fa-solid fa-users"></i> 0 / 20</div>
                <button class="btn-join" onclick="enterRoom('Animals')">Join</button>
            </div>

            <div class="room-row-card">
                <div class="room-row-top">
                    <div class="room-title-badge">
                        <div class="room-dot" style="background: #ff9f43;"></div>
                        <span>Food</span>
                    </div>
                    <div class="room-category-tag" style="color: #ff9f43;">Food</div>
                </div>
                <div style="color: var(--text-muted); font-size: 14px;"><i class="fa-solid fa-users"></i> 0 / 20</div>
                <button class="btn-join" onclick="enterRoom('Food')">Join</button>
            </div>

            <div class="room-row-card">
                <div class="room-row-top">
                    <div class="room-title-badge">
                        <div class="room-dot" style="background: #2196f3;"></div>
                        <span>Sports</span>
                    </div>
                    <div class="room-category-tag" style="color: #2196f3;">Sports</div>
                </div>
                <div style="color: var(--text-muted); font-size: 14px;"><i class="fa-solid fa-users"></i> 0 / 20</div>
                <button class="btn-join" onclick="enterRoom('Sports')">Join</button>
            </div>
        </div>
    </div>

    <div id="chatScreen" class="screen" style="padding:0;">
        <div class="chat-layout">
            <div class="chat-top-navbar">
                <button style="background:none; border:none; color:white; font-size:20px; cursor:pointer;" onclick="exitChat()"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="players-dropdown">
                    <i class="fa-solid fa-users" style="color: var(--text-muted);"></i>
                    <span>Players</span>
                    <span class="players-count-badge" id="playerBadgeCount">1</span>
                </div>
                <div style="width:20px;"></div>
            </div>

            <div class="chat-messages-container" id="chatMessageStream"></div>

            <div class="sticky-bottom-dock">
                <input type="text" id="chatInputMessageNode" class="message-input-node" placeholder="Type a message...">
                <button class="btn-send-message" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        let userData = { name: "", avatar: "" };

        function showActiveScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleImageFile(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function() {
                    document.getElementById('userAvatarPreview').src = reader.result;
                    userData.avatar = reader.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function generateRandomAvatar() {
            const randomId = Math.floor(Math.random() * 1000);
            const url = `https://api.dicebear.com/7.x/bottts/svg?seed=${randomId}`;
            document.getElementById('userAvatarPreview').src = url;
            userData.avatar = url;
        }

        function triggerLogin(type) {
            if (type === 'gmail') {
                document.getElementById('gmailLoader').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('gmailLoader').style.display = 'none';
                    userData.name = "Google_User_" + Math.floor(10 + Math.random() * 90);
                    showActiveScreen('roomsScreen');
                }, 1500);
            } else {
                const enteredName = document.getElementById('usernameInputNode').value.trim();
                if (!enteredName) return alert("Please enter your name first!");
                userData.name = enteredName;
                showActiveScreen('roomsScreen');
            }
        }

        function enterRoom(roomName) {
            showActiveScreen('chatScreen');
            const stream = document.getElementById('chatMessageStream');
            stream.innerHTML = ""; // تنظيف الغرفة

            // إضافة كبسولة الدخول الفورية الاحترافية مثل الصورة تماماً
            const capsule = document.createElement('div');
            capsule.className = 'status-capsule-chip';
            capsule.innerHTML = `${userData.name} joined the room`;
            stream.appendChild(capsule);
        }

        function sendMessage() {
            const input = document.getElementById('chatInputMessageNode');
            const text = input.value.trim();
            if (!text) return;

            const stream = document.getElementById('chatMessageStream');
            const msgRow = document.createElement('div');
            msgRow.style.cssText = "align-self: flex-start; background: #283046; padding: 10px 16px; border-radius: 12px; max-width: 80%; font-size: 15px; margin-bottom: 4px;";
            msgRow.innerHTML = `<b style="color: var(--primary-yellow); font-size: 12px; display: block; margin-bottom: 2px;">${userData.name}</b> ${text}`;
            
            stream.appendChild(msgRow);
            input.value = "";
            stream.scrollTop = stream.scrollHeight;
        }

        function exitChat() {
            showActiveScreen('roomsScreen');
        }

        // إرسال بالضغط على Enter
        document.getElementById('chatInputMessageNode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
    </html>
