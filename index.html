<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات HALA - ملصقات واتس</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b141a; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        /* الهيدر */
        header { background-color: #202c33; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 2px solid #00a884; }
        header span { color: #00a884; }

        /* ساحة الشات */
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 10px; font-size: 16px; line-height: 1.4; animation: fadeIn 0.2s ease; }
        .msg-in { background-color: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-out { background-color: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        /* تصميم الملصق داخل الشات */
        .sticker-img { width: 130px; height: 130px; object-fit: contain; background: none !important; border: none !important; }
        .sticker-msg { background: none !important; padding: 0 !important; }

        /* صندوق الإدخال */
        .input-area { background-color: #202c33; padding: 12px; display: flex; gap: 10px; align-items: center; position: relative; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; background-color: #2a3942; color: white; font-size: 16px; outline: none; }
        button { background-color: #00a884; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .sticker-btn { background-color: #2a3942; font-size: 22px; padding: 6px 12px; border-radius: 50px; border: none; cursor: pointer; color: white; }

        /* قائمة ملصقات الواتس الكبيرة */
        .stickers-panel { display: none; position: absolute; bottom: 70px; right: 15px; background-color: #26353d; border: 1px solid #374248; border-radius: 10px; padding: 12px; width: 300px; max-height: 250px; overflow-y: auto; grid-template-columns: repeat(3, 1fr); gap: 12px; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .stickers-panel img { width: 100%; height: 75px; object-fit: contain; cursor: pointer; transition: transform 0.2s; }
        .stickers-panel img:hover { transform: scale(1.15); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>📱 غرفة شات <span>HALA</span></header>

    <div class="chat-area" id="chatArea">
        <div class="message msg-in">أهلاً بك في روم <b>hala</b>! اضغط على رمز الملصق تحت وجرب ملصقات الواتس الجديدة لعيونك ركبناها 🔥</div>
    </div>

    <!-- قائمة ملصقات الواتس (صور حقيقية متحركة ومنوعة) -->
    <div class="stickers-panel" id="stickersPanel">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbms1N3NjcXpndXN0ZTZnbXg5Z3pxN3g5amN6ZnN5YWh3eHd0bW9uZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cmS69dQZCc3t0BmsxG/giphy.gif" onclick="sendSticker(this.src)">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbTh6Z3RscW16eXFlZnd4NWhpaXZuNms1MndmZnZscjd6ZmZpdWZmdCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/R7AW255ijTdV6/giphy.gif" onclick="sendSticker(this.src)">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZydWp3M3p2Ymdvbm1waHlyYnR5dW5oZWp1MWh1ZXo5amZ3d3AydCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/kL1SSNVvAMwTe/giphy.gif" onclick="sendSticker(this.src)">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWNoZTh0MHlsNDgybm8zdmdxbG8xNDRia3BlMzhvM281OGU5azE0MCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/C9x8gX02SnMIoAclXa/giphy.gif" onclick="sendSticker(this.src)">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHIycGtxY3J0NjY2ZmpxYWpxcW80OWtlczhnbmU1NmE5bGsydDhzMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3orif3P80v5m9wK4Q8/giphy.gif" onclick="sendSticker(this.src)">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbDVtcHkza3B2ZWZ5d3c0MzF0bWhjZHNxZHoxdWwyeXloN2J0YzU3NiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MeIucAjPKoA120M7sM/giphy.gif" onclick="sendSticker(this.src)">
    </div>

    <div class="input-area">
        <button class="sticker-btn" onclick="toggleStickers()">🖼️</button>
        <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا..." onkeypress="checkEnter(event)">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const stickersPanel = document.getElementById('stickersPanel');

        function toggleStickers() {
            stickersPanel.style.display = stickersPanel.style.display === 'grid' ? 'none' : 'grid';
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if(text === '') return;

            createMessageElement(text, 'msg-out');
            msgInput.value = '';
            stickersPanel.style.display = 'none';

            setTimeout(() => {
                createMessageElement("كفو يا غالي، الملصقات شغالة نار! 🔥", 'msg-in');
            }, 1000);
        }

        function sendSticker(imgUrl) {
            const stickerHtml = `<img src="${imgUrl}" class="sticker-img">`;
            createMessageElement(stickerHtml, 'msg-out sticker-msg');
            stickersPanel.style.display = 'none';
            
            // رد تلقائي بملصق تفاعلي
            setTimeout(() => {
                const replySticker = `<img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbms1N3NjcXpndXN0ZTZnbXg5Z3pxN3g5amN6ZnN5YWh3eHd0bW9uZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cmS69dQZCc3t0BmsxG/giphy.gif" class="sticker-img">`;
                createMessageElement(replySticker, 'msg-in sticker-msg');
            }, 1200);
        }

        function createMessageElement(content, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerHTML = content;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function checkEnter(e) {
            if(e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
