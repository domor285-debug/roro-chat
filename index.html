<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gartic الأسطورية | Rayan Games</title>
    <style>
        :root {
            --main-bg: #1e1e2f;
            --panel-bg: #27293d;
            --accent-color: #e14eca;
            --text-color: #ffffff;
            --border-color: #3d3f5d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(225, 78, 202, 0.5);
        }

        .game-info {
            font-size: 18px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 70px);
            position: relative;
        }

        /* القائمة الجانبية للاعبين */
        .players-panel {
            width: 200px;
            background-color: var(--panel-bg);
            border-left: 2px solid var(--border-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-card {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--accent-color);
        }

        /* منطقة الرسم والتحكم */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #14141f;
        }

        #paintCanvas {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        .toolbar {
            margin-top: 15px;
            background: var(--panel-bg);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .color-picker {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .btn-clear {
            background: #ff3366;
        }

        /* نظام الشات */
        .chat-panel {
            width: 300px;
            background-color: var(--panel-bg);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            word-break: break-all;
        }

        .msg.system {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            font-weight: bold;
            text-align: center;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 2px solid var(--border-color);
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background: #14141f;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Gartic الأسطورية 🔥</div>
        <div class="game-info" id="wordDisplay">الكلمة المراد رسمها: جاري اختيار كلمة...</div>
        <div class="game-info">النقاط: <span id="score">0</span></div>
    </header>

    <div class="main-container">
        <div class="players-panel">
            <h3>اللاعبين</h3>
            <div class="player-card">
                <span>ريان (أنت)</span>
                <span id="playerScore">0</span>
            </div>
            <div class="player-card" style="border-right-color: #33cdff;">
                <span>بوت التحدي</span>
                <span>120</span>
            </div>
        </div>

        <div class="canvas-area">
            <canvas id="paintCanvas" width="700" height="450"></canvas>
            
            <div class="toolbar">
                <input type="color" id="colorPicker" class="color-picker" value="#000000">
                <input type="range" id="brushSize" min="2" max="20" value="5">
                <label for="brushSize">الحجم</label>
                <button class="btn btn-clear" id="clearBtn">مسح اللوحة</button>
                <button class="btn" id="nextWordBtn">تغيير الكلمة</button>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-messages" id="chatMessages">
                <div class="msg system">مرحباً بك في تحدي الرسم! خمن الكلمة المكتوبة في الأعلى أو ارسمها!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="اكتب تخمينك أو دردش هنا...">
                <button class="btn" id="sendBtn">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        // إعدادات لوحة الرسم
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const clearBtn = document.getElementById('clearBtn');
        
        let painting = false;

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colorPicker.value;

            // حساب موقع الماوس بالنسبة للوحة الرسم
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseleave', finishedPosition);

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // نظام اللعبة والكلمات والشات
        const words = ['سيارة', 'تفاحة', 'شجرة', 'بيت', 'قلم', 'كمبيوتر', 'هاتف', 'شمس', 'قمر', 'سيف'];
        let currentWord = '';
        let score = 0;

        const wordDisplay = document.getElementById('wordDisplay');
        const scoreDisplay = document.getElementById('score');
        const playerScore = document.getElementById('playerScore');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const nextWordBtn = document.getElementById('nextWordBtn');

        function setRandomWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            wordDisplay.innerText = `الكلمة المراد رسمها: ${currentWord}`;
            ctx.clearRect(0, 0, canvas.width, canvas.height); // مسح اللوحة عند تغيير الكلمة
        }

        function handleSendMessage() {
            const text = chatInput.value.trim();
            if (text === '') return;

            // إضافة رسالة اللاعب للشات
            appendMessage('ريان', text);

            // التحقق من التخمين
            if (text === currentWord) {
                appendSystemMessage('🎉 مبروك! لقد قمت بتخمين الكلمة الصحيحة!');
                score += 10;
                scoreDisplay.innerText = score;
                playerScore.innerText = score;
                setRandomWord();
            }

            chatInput.value = '';
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg');
            msgDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', 'system');
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        sendBtn.addEventListener('click', handleSendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSendMessage();
        });

        nextWordBtn.addEventListener('click', () => {
            setRandomWord();
            appendSystemMessage('🔄 تم تغيير الكلمة بطلب منك.');
        });

        // تشغيل اللعبة لأول مرة عند تحميل الصفحة
        setRandomWord();
    </script>
</body>

            if(e.key === 'Enter') sendMessage();

    </script>
</body>
</html>
