<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gartic Chat Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --bg:        #0d0f1a;
  --surface:   #151828;
  --card:      #1c2035;
  --border:    #252a42;
  --accent:    #6c63ff;
  --accent2:   #ff6b6b;
  --accent3:   #43e97b;
  --yellow:    #ffd166;
  --text:      #e8eaf2;
  --muted:     #6b7099;
  --radius:    16px;
  --font:      'Space Grotesk', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen { display: none; width: 100%; height: 100vh; overflow-y: auto; }
.screen.active { display: flex; flex-direction: column; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 12px 24px; border-radius: 50px;
  font-size: 14px; font-weight: 600; z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  opacity: 0; pointer-events: none; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.success { border-color: var(--accent3); color: var(--accent3); }
#toast.error   { border-color: var(--accent2); color: var(--accent2); }
#toast.info    { border-color: var(--accent);  color: var(--accent); }

/* ── LOADER OVERLAY ── */
#loaderOverlay {
  display: none; position: fixed; inset: 0;
  background: rgba(13,15,26,.85); backdrop-filter: blur(6px);
  align-items: center; justify-content: center; z-index: 8888; flex-direction: column; gap: 16px;
}
#loaderOverlay.show { display: flex; }
.loader-ring {
  width: 48px; height: 48px; border-radius: 50%;
  border: 3px solid var(--border); border-top-color: var(--accent);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════ */
#authScreen {
  align-items: center; justify-content: center;
  padding: 24px 16px; min-height: 100vh;
}
.auth-container {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.auth-logo {
  font-size: 13px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.auth-title {
  font-size: clamp(32px, 7vw, 48px); font-weight: 900;
  background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 50%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.2; text-align: center; margin-bottom: 8px;
}
.auth-sub {
  color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 24px;
}
.auth-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 24px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.avatar-wrap {
  position: relative; width: 88px; height: 88px; margin: 0 auto 16px; cursor: pointer;
}
.avatar-wrap img {
  width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
  border: 3px solid var(--accent); background: var(--surface);
}
.avatar-edit-badge {
  position: absolute; bottom: 0; right: 0;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 11px; border: 2px solid var(--card); cursor: pointer;
}
.avatar-row { display: flex; gap: 10px; margin-bottom: 16px; }
.btn-sm {
  flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-weight: 600; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: .2s; font-family: var(--font);
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.field-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
.field-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 14px;
  outline: none; font-family: var(--font); margin-bottom: 16px;
  transition: border-color .2s;
}
.field-input:focus { border-color: var(--accent); }
.btn-primary {
  width: 100%; padding: 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 12px; font-weight: 700; font-size: 15px;
  cursor: pointer; font-family: var(--font); transition: .2s;
  box-shadow: 0 4px 20px rgba(108,99,255,.4);
}
.btn-primary:hover { background: #7c74ff; transform: translateY(-1px); }
.divider {
  display: flex; align-items: center; gap: 10px;
  color: var(--muted); font-size: 11px; font-weight: 600; margin: 16px 0;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.btn-google {
  width: 100%; padding: 12px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); font-weight: 600; font-size: 14px;
  cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: .2s;
}

/* ══════════════════════════════════════
   ROOMS SCREEN
══════════════════════════════════════ */
.top-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.top-bar-title { font-size: 18px; font-weight: 700; }
.user-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 50px; padding: 5px 12px 5px 5px; cursor: pointer;
}
.user-pill img { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
.user-pill span { font-size: 13px; font-weight: 600; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.rooms-body { padding: 20px 16px; max-width: 800px; width: 100%; margin: 0 auto; flex: 1; }
.section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.section-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.btn-create {
  background: var(--accent); color: #fff; border: none; border-radius: 10px;
  padding: 9px 16px; font-weight: 600; font-size: 13px; cursor: pointer;
  font-family: var(--font); display: flex; align-items: center; gap: 6px; transition: .2s;
}
.rooms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.room-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; display: flex; flex-direction: column; justify-content: space-between; transition: border-color .2s, transform .15s;
}
.room-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.room-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.room-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; overflow: hidden; text-overflow: ellipsis; }
.room-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.room-meta { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; flex-shrink: 0; }
.room-owner { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.capacity-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 8px 0 12px 0; }
.capacity-fill { height: 100%; border-radius: 3px; background: var(--accent3); transition: width .4s; }
.room-card-actions { display: flex; gap: 8px; }
.btn-join {
  flex: 1; padding: 10px; background: var(--accent3); color: #0d1a0d;
  border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: .2s;
}
.btn-join:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
.btn-delete-room {
  padding: 10px 14px; background: rgba(255,107,107,.1); color: var(--accent2);
  border: 1px solid rgba(255,107,107,.2); border-radius: 10px; cursor: pointer; transition: .2s;
}

/* ── MODALS ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  align-items: center; justify-content: center; z-index: 7000; padding: 16px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px; width: 100%; max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-weight: 600; cursor: pointer;
}
.btn-confirm {
  flex: 1; padding: 12px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
}
.capacity-row { display: flex; align-items: center; gap: 12px; }
input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; }
.capacity-num { font-size: 18px; font-weight: 700; color: var(--accent); min-width: 24px; text-align: right; }

/* ══════════════════════════════════════
   CHAT SCREEN
══════════════════════════════════════ */
#chatScreen { background: var(--bg); height: 100vh; display: flex; flex-direction: column; }
.chat-main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
.chat-content-pane { display: flex; flex-direction: column; flex: 1; height: 100%; overflow: hidden; }

.chat-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
}
.btn-back {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.chat-room-info { flex: 1; min-width: 0; }
.chat-room-name { font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-room-sub { font-size: 12px; color: var(--muted); }
.btn-members {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 7px 12px; display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text);
}

.messages-area {
  flex: 1; padding: 16px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 6px;
  background: max-shadow;
}
.sys-chip {
  align-self: center; background: rgba(108,99,255,.1); color: #a78bfa;
  border: 1px solid rgba(108,99,255,.2); border-radius: 50px;
  padding: 4px 14px; font-size: 11px; font-weight: 600; margin: 4px 0;
}
.sys-chip.leave { background: rgba(255,107,107,.1); color: var(--accent2); border-color: rgba(255,107,107,.2); }
.sys-chip.win { background: rgba(67,233,123,.1); color: var(--accent3); border-color: rgba(67,233,123,.2); }

.msg-group { display: flex; flex-direction: column; margin: 2px 0; }
.msg-row { display: flex; align-items: flex-end; gap: 8px; }
.msg-row.mine { flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.msg-bubble {
  max-width: 75%; padding: 10px 14px; border-radius: 16px 16px 16px 4px;
  background: var(--card); border: 1px solid var(--border);
  font-size: 14px; line-height: 1.4; word-break: break-word;
}
.msg-row.mine .msg-bubble { background: var(--accent); border-color: var(--accent); border-radius: 16px 16px 4px 16px; }
.msg-sender { font-size: 11px; font-weight: 700; color: var(--muted); margin-left: 4px; margin-bottom: 2px; }

.chat-dock {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 12px 16px; display: flex; flex-direction: column; gap: 8px;
}
.chat-input-row { display: flex; gap: 10px; align-items: center; }
.chat-input {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; color: var(--text);
  font-size: 14px; outline: none; font-family: var(--font); resize: none; max-height: 80px;
  min-height: 42px;
}
.btn-send {
  width: 42px; height: 42px; background: var(--accent); color: #fff;
  border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .2s;
}
.btn-challenge-send {
  width: 100%; padding: 10px; background: transparent;
  border: 1px solid var(--accent2); border-radius: 10px;
  color: var(--accent2); font-weight: 600; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: .2s;
}
.btn-challenge-send:hover { background: rgba(255,107,107,.1); }

/* Challenge Bubble */
.challenge-bubble {
  align-self: center; width: 100%; max-width: 340px;
  background: linear-gradient(135deg, rgba(108,99,255,.12), rgba(255,107,107,.08));
  border: 1px solid var(--border); border-radius: 16px; padding: 14px;
  text-align: center; margin: 6px 0;
}
.challenge-bubble .ch-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--yellow); }
.challenge-bubble .ch-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.btn-accept-challenge {
  width: 100%; padding: 9px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; transition: .2s;
}
.btn-accept-challenge:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

/* Members Side Panel */
.members-panel {
  display: none; width: 250px; background: var(--surface); border-left: 1px solid var(--border);
  flex-direction: column; height: 100%;
}
.members-panel.show { display: flex; }
.members-header { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.members-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
.member-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; background: var(--card); }
.member-item img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
.member-item .m-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.member-item .m-you { font-size: 10px; color: var(--accent); font-weight: 700; }

/* Challenge Setup Options */
.ch-option-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.ch-option {
  flex: 1; min-width: 65px; padding: 8px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-weight: 600; font-size: 12px; cursor: pointer; text-align: center;
}
.ch-option.active { border-color: var(--accent); background: rgba(108,99,255,.15); color: var(--accent); }

/* ══════════════════════════════════════
   QUIZ OVERLAY
══════════════════════════════════════ */
#quizOverlay {
  display: none; position: fixed; inset: 0;
  background: var(--bg); z-index: 9000;
  flex-direction: column; align-items: center; justify-content: center; padding: 16px;
}
#quizOverlay.show { display: flex; }
.quiz-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 24px; width: 100%; max-width: 460px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.quiz-title { font-size: 13px; font-weight: 700; color: var(--muted); }
.quiz-score-row { display: flex; gap: 12px; }
.quiz-score-item { text-align: center; }
.quiz-score-item .name { font-size: 11px; color: var(--muted); max-width: 60px; overflow: hidden; text-overflow: ellipsis; }
.quiz-score-item .val { font-size: 18px; font-weight: 700; color: var(--accent); }
.quiz-score-item .val.opp { color: var(--accent2); }
.quiz-progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
.quiz-progress-fill { height: 100%; background: var(--accent); transition: width .3s; }
.quiz-timer { text-align: center; font-size: 24px; font-weight: 700; color: var(--yellow); margin-bottom: 12px; }
.quiz-q { font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 16px; text-align: center; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-weight: 600; font-size: 13px;
  cursor: pointer; text-align: left; font-family: var(--font); transition: .2s;
}
.quiz-opt.correct { border-color: var(--accent3); background: rgba(67,233,123,.1); color: var(--accent3); }
.quiz-opt.wrong { border-color: var(--accent2); background: rgba(255,107,107,.1); color: var(--accent2); }

/* Responsive adjustments */
@media (max-width: 600px) {
  .rooms-grid { grid-template-columns: 1fr; }
  .members-panel { position: absolute; right: 0; top: 0; bottom: 0; z-index: 600; box-shadow: -5px 0 20px rgba(0,0,0,0.5); }
  .msg-bubble { max-width: 85%; }
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="loaderOverlay">
  <div class="loader-ring"></div>
  <p id="loaderText">Please wait...</p>
</div>

<div id="authScreen" class="screen active">
  <div class="auth-container">
    <div class="auth-logo">Gartic Chat</div>
    <div class="auth-title">Play Together</div>
    <p class="auth-sub">Join rooms, chat, and challenge friends</p>

    <div class="auth-card">
      <div class="avatar-wrap" onclick="document.getElementById('avatarFileInput').click()">
        <img id="avatarPreview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236c63ff'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E">
        <div class="avatar-edit-badge"><i class="fa-solid fa-pen fa-xs"></i></div>
      </div>
      <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">

      <div class="avatar-row">
        <button class="btn-sm" onclick="randomAvatar()"><i class="fa-solid fa-shuffle"></i> Random</button>
        <button class="btn-sm" onclick="document.getElementById('avatarFileInput').click()"><i class="fa-solid fa-image"></i> Upload</button>
      </div>

      <div class="field-label">YOUR NAME</div>
      <input type="text" id="nameInput" class="field-input" placeholder="Enter your name..." maxlength="20">

      <button class="btn-primary" onclick="loginGuest()">Play Now</button>
      <div class="divider">OR</div>
      <button class="btn-google" onclick="loginGoogle()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="16">
        Continue with Google
      </button>
    </div>
  </div>
</div>

<div id="roomsScreen" class="screen">
  <div class="top-bar">
    <div class="top-bar-title">Rooms</div>
    <div class="user-pill" id="userPill">
      <img id="pillAvatar" src="">
      <span id="pillName"></span>
    </div>
  </div>
  <div class="rooms-body">
    <div class="section-header">
      <div class="section-title">Live Rooms</div>
      <button class="btn-create" onclick="openCreateRoom()"><i class="fa-solid fa-plus"></i> Create Room</button>
    </div>
    <div id="roomsList" class="rooms-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="createRoomModal">
  <div class="modal-box">
    <div class="modal-title">Create a Room</div>
    <div class="field-label">ROOM NAME</div>
    <input type="text" id="newRoomName" class="field-input" placeholder="e.g. Trivia Night" maxlength="30">
    <div class="field-label">MAX PLAYERS</div>
    <div class="capacity-row" style="margin-bottom:16px;">
      <input type="range" id="capacitySlider" min="2" max="15" value="8" oninput="document.getElementById('capacityNum').textContent=this.value">
      <div class="capacity-num" id="capacityNum">8</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCreateRoom()">Cancel</button>
      <button class="btn-confirm" onclick="createRoom()">Create</button>
    </div>
  </div>
</div>

<div id="chatScreen" class="screen">
  <div class="chat-bar">
    <button class="btn-back" onclick="leaveRoom()"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="chat-room-info">
      <div class="chat-room-name" id="chatRoomName">Room</div>
      <div class="chat-room-sub" id="chatRoomSub">0 members</div>
    </div>
    <button class="btn-members" onclick="toggleMembers()">
      <div class="online-dot"></div>
      <span id="membersBadge">0</span>
    </button>
  </div>

  <div class="chat-main-container">
    <div class="chat-content-pane">
      <div class="messages-area" id="messagesArea"></div>
      <div class="chat-dock">
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" placeholder="Message..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onkeydown="chatKey(event)"></textarea>
          <button class="btn-send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
        <button class="btn-challenge-send" onclick="openChallengeSetup()">
          <i class="fa-solid fa-bolt"></i> Send a Challenge
        </button>
      </div>
    </div>

    <div class="members-panel" id="membersPanel">
      <div class="members-header">
        <span>Members</span>
        <button onclick="toggleMembers()" style="background:none;border:none;color:var(--muted);cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="members-list" id="membersList"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="challengeSetupModal">
  <div class="modal-box">
    <div class="modal-title">⚡ Challenge Setup</div>
    <div class="field-label">NUMBER OF QUESTIONS</div>
    <div class="ch-option-row" id="qCountOpts">
      <button class="ch-option active" data-val="5" onclick="selectOpt('qCountOpts',this)">5</button>
      <button class="ch-option" data-val="10" onclick="selectOpt('qCountOpts',this)">10</button>
      <button class="ch-option" data-val="15" onclick="selectOpt('qCountOpts',this)">15</button>
    </div>
    <div class="field-label">DIFFICULTY</div>
    <div class="ch-option-row" id="diffOpts">
      <button class="ch-option active" data-val="easy" onclick="selectOpt('diffOpts',this)">Easy</button>
      <button class="ch-option" data-val="medium" onclick="selectOpt('diffOpts',this)">Medium</button>
      <button class="ch-option" data-val="hard" onclick="selectOpt('diffOpts',this)">Hard</button>
    </div>
    <div class="field-label">CATEGORY</div>
    <div class="ch-option-row" id="catOpts">
      <button class="ch-option active" data-val="any" onclick="selectOpt('catOpts',this)">Any</button>
      <button class="ch-option" data-val="science" onclick="selectOpt('catOpts',this)">Science</button>
      <button class="ch-option" data-val="history" onclick="selectOpt('catOpts',this)">History</button>
      <button class="ch-option" data-val="sports" onclick="selectOpt('catOpts',this)">Sports</button>
      <button class="ch-option" data-val="tech" onclick="selectOpt('catOpts',this)">Tech</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeChallengeSetup()">Cancel</button>
      <button class="btn-confirm" onclick="sendChallenge()">Send</button>
    </div>
  </div>
</div>

<div id="quizOverlay">
  <div class="quiz-box">
    <div class="quiz-header">
      <div class="quiz-title" id="quizLabel">Question 1 / 5</div>
      <div class="quiz-score-row">
        <div class="quiz-score-item">
          <div class="name" id="myQuizName">You</div>
          <div class="val" id="myScore">0</div>
        </div>
        <div style="color:var(--muted);font-weight:700;">:</div>
        <div class="quiz-score-item">
          <div class="name" id="oppQuizName">Opponent</div>
          <div class="val opp" id="oppScore">0</div>
        </div>
      </div>
    </div>
    <div class="quiz-progress"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
    <div class="quiz-timer" id="quizTimer">15</div>
    <div class="quiz-q" id="quizQuestion">Loading...</div>
    <div class="quiz-options" id="quizOptions"></div>
  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const QUESTIONS_BANK = {
  any: [
    { q:"What is the largest planet in our solar system?", opts:["Jupiter","Saturn","Mars","Neptune"], a:0 },
    { q:"Who wrote 'Romeo and Juliet'?", opts:["Shakespeare","Dickens","Tolstoy","Hugo"], a:0 },
    { q:"What is the chemical symbol for Gold?", opts:["Au","Ag","Go","Gd"], a:0 },
    { q:"How many continents are there on Earth?", opts:["7","6","5","8"], a:0 },
    { q:"What year did World War II end?", opts:["1945","1944","1946","1943"], a:0 },
    { q:"Who painted the Mona Lisa?", opts:["Leonardo da Vinci","Picasso","Michelangelo","Raphael"], a:0 },
    { q:"What is the smallest country in the world?", opts:["Vatican City","Monaco","San Marino","Liechtenstein"], a:0 }
  ],
  science: [
    { q:"What planet is closest to the Sun?", opts:["Mercury","Venus","Earth","Mars"], a:0 },
    { q:"What is the atomic number of Carbon?", opts:["6","12","8","4"], a:0 },
    { q:"Which gas is most abundant in Earth's atmosphere?", opts:["Nitrogen","Oxygen","Argon","CO2"], a:0 }
  ],
  history: [
    { q:"In what year did Christopher Columbus reach America?", opts:["1492","1482","1502","1512"], a:0 },
    { q:"The Berlin Wall fell in?", opts:["1989","1987","1991","1985"], a:0 }
  ],
  sports: [
    { q:"How many players on a football team?", opts:["11","9","10","12"], a:0 },
    { q:"Which sport uses a birdie?", opts:["Badminton","Tennis","Golf","Squash"], a:0 }
  ],
  tech: [
    { q:"Who co-founded Apple?", opts:["Steve Jobs","Bill Gates","Jeff Bezos","Mark Zuckerberg"], a:0 },
    { q:"What does CPU stand for?", opts:["Central Processing Unit","Core Processing Unit","Computer Processing Unit","Central Processor Utility"], a:0 },
    { q:"Which language is used for web styling?", opts:["CSS","HTML","JavaScript","Python"], a:0 }
  ]
};

let db, auth;
let currentUser = null;
let currentRoom = null;
let membersInRoom = {};
let messageListener = null, membersListener = null, roomsListener = null;
let roomsData = {};
let quizState = { questions: [], idx: 0, myScore: 0, oppScore: 0, timer: null, timeLeft: 15, answered: false };

function initFirebase() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    auth = firebase.auth();
    return true;
  } catch(e) {
    showToast("Firebase configuration missing.", "error");
    return false;
  }
}

function showToast(msg, type="info") {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 3000);
}
function showLoader(text="Please wait...") {
  document.getElementById('loaderText').textContent = text;
  document.getElementById('loaderOverlay').classList.add('show');
}
function hideLoader() { document.getElementById('loaderOverlay').classList.remove('show'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function generateColor(str) {
  const colors = ['#6c63ff','#ff6b6b','#43e97b','#ffd166','#a78bfa'];
  let h = 0;
  for(let c of str) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}
function defaultAvatar(name) {
  const initials = name ? name.slice(0,2).toUpperCase() : 'GG';
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(initials)}&background=${generateColor(name||'x').slice(1)}&color=fff&bold=true`;
}

function handleAvatarUpload(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    document.getElementById('avatarPreview').src = reader.result;
    window._pendingAvatar = reader.result;
  };
  reader.readAsDataURL(file);
}
function randomAvatar() {
  const seed = Math.floor(Math.random()*9999);
  const url = `https://api.dicebear.com/7.x/bottts/svg?seed=${seed}`;
  document.getElementById('avatarPreview').src = url;
  window._pendingAvatar = url;
}

function loginGuest() {
  if(!initFirebase()) return;
  const name = document.getElementById('nameInput').value.trim();
  if(!name) { showToast("Please enter your name!", "error"); return; }
  const avatar = window._pendingAvatar || defaultAvatar(name);
  showLoader("Joining...");
  auth.signInAnonymously().then(res => {
    return db.collection('users').doc(res.user.uid).set({ name, avatar, uid: res.user.uid });
  }).then(() => {
    afterLogin(auth.currentUser.uid, name, avatar);
  }).catch(e => { hideLoader(); showToast(e.message, "error"); });
}

function loginGoogle() {
  if(!initFirebase()) return;
  const provider = new firebase.auth.GoogleAuthProvider();
  showLoader("Connecting with Google...");
  auth.signInWithPopup(provider).then(res => {
    const user = res.user;
    const name = user.displayName || "User";
    const avatar = user.photoURL || defaultAvatar(name);
    return db.collection('users').doc(user.uid).set({ name, avatar, uid: user.uid }, { merge: true }).then(() => afterLogin(user.uid, name, avatar));
  }).catch(e => { hideLoader(); showToast(e.message, "error"); });
}

function afterLogin(uid, name, avatar) {
  currentUser = { uid, name, avatar };
  document.getElementById('pillAvatar').src = avatar;
  document.getElementById('pillName').textContent = name;
  hideLoader();
  showScreen('roomsScreen');
  listenRooms();
}

function openCreateRoom() {
  if(!currentUser) return;
  const owns = Object.values(roomsData).find(r => r.ownerId === currentUser.uid);
  if(owns) { showToast("You already have a room active.", "error"); return; }
  document.getElementById('createRoomModal').classList.add('show');
}
function closeCreateRoom() {
  document.getElementById('createRoomModal').classList.remove('show');
  document.getElementById('newRoomName').value = '';
}
function createRoom() {
  const name = document.getElementById('newRoomName').value.trim();
  if(!name) { showToast("Enter room name!", "error"); return; }
  const capacity = parseInt(document.getElementById('capacitySlider').value);
  showLoader("Creating...");
  db.collection('rooms').add({
    name, capacity, ownerId: currentUser.uid, ownerName: currentUser.name,
    memberCount: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => { hideLoader(); closeCreateRoom(); }).catch(e => { hideLoader(); showToast(e.message,"error"); });
}

function listenRooms() {
  if(roomsListener) roomsListener();
  roomsListener = db.collection('rooms').orderBy('createdAt','desc').onSnapshot(snap => {
    roomsData = {};
    snap.forEach(doc => { roomsData[doc.id] = { id: doc.id, ...doc.data() }; });
    renderRooms();
  });
}

function renderRooms() {
  const list = document.getElementById('roomsList');
  const rooms = Object.values(roomsData);
  if(!rooms.length) {
    list.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">No rooms live. Create one!</div>`;
    return;
  }
  list.innerHTML = rooms.map(r => {
    const isFull = r.memberCount >= r.capacity;
    const isOwner = currentUser && r.ownerId === currentUser.uid;
    const pct = Math.min(100, ((r.memberCount||0) / r.capacity) * 100);
    return `<div class="room-card">
      <div>
        <div class="room-card-top">
          <div class="room-name"><div class="room-dot" style="background:var(--accent3)"></div>${r.name}</div>
          <div class="room-meta"><span>${r.memberCount||0} / ${r.capacity}</span></div>
        </div>
        <div class="room-owner">by ${r.ownerName}</div>
        <div class="capacity-bar"><div class="capacity-fill" style="width:${pct}%;background:${isFull?'var(--accent2)':'var(--accent3)'}"></div></div>
      </div>
      <div class="room-card-actions">
        <button class="btn-join" ${isFull?'disabled':''} onclick="joinRoom('${r.id}')">${isFull?'Full':'Join Room'}</button>
        ${isOwner ? `<button class="btn-delete-room" onclick="deleteRoom('${r.id}')"><i class="fa-solid fa-trash"></i></button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function deleteRoom(roomId) {
  if(!confirm("Delete room?")) return;
  db.collection('rooms').doc(roomId).delete();
}

function joinRoom(roomId) {
  const room = roomsData[roomId]; if(!room) return;
  showLoader("Entering...");
  const mRef = db.collection('rooms').doc(roomId).collection('members').doc(currentUser.uid);
  const rRef = db.collection('rooms').doc(roomId);

  db.runTransaction(async t => {
    const snap = await t.get(rRef);
    const cnt = snap.data().memberCount || 0;
    if(cnt >= snap.data().capacity) throw new Error("Room filled up!");
    t.set(mRef, { name: currentUser.name, avatar: currentUser.avatar, uid: currentUser.uid, ts: Date.now() });
    t.update(rRef, { memberCount: firebase.firestore.FieldValue.increment(1) });
  }).then(() => {
    currentRoom = room;
    document.getElementById('chatRoomName').textContent = room.name;
    hideLoader(); showScreen('chatScreen');
    document.getElementById('messagesArea').innerHTML = '';
    listenMessages(roomId); listenMembers(roomId);
    sendSystemMsg(roomId, `${currentUser.name} entered`);
  }).catch(e => { hideLoader(); showToast(e.message,"error"); });
}

function leaveRoom() {
  if(!currentRoom) { showScreen('roomsScreen'); return; }
  const roomId = currentRoom.id;
  const mRef = db.collection('rooms').doc(roomId).collection('members').doc(currentUser.uid);
  const rRef = db.collection('rooms').doc(roomId);

  if(messageListener) { messageListener(); messageListener = null; }
  if(membersListener) { membersListener(); membersListener = null; }

  sendSystemMsg(roomId, `${currentUser.name} left`, true);
  
  db.runTransaction(async t => {
    t.delete(mRef);
    t.update(rRef, { memberCount: firebase.firestore.FieldValue.increment(-1) });
  }).then(() => {
    currentRoom = null;
    showScreen('roomsScreen');
  }).catch(() => { showScreen('roomsScreen'); });
}

window.addEventListener('beforeunload', () => { if(currentRoom) leaveRoom(); });

function listenMessages(roomId) {
  if(messageListener) messageListener();
  messageListener = db.collection('rooms').doc(roomId).collection('messages').orderBy('ts','asc').onSnapshot(snap => {
    snap.docChanges().forEach(c => { if(c.type === 'added') renderMessage(c.doc.data(), c.doc.id); });
  });
}

function renderMessage(data, id) {
  const area = document.getElementById('messagesArea');
  let el = document.createElement('div');
  if(data.type === 'system') {
    el.className = 'sys-chip' + (data.leave ? ' leave' : '') + (data.win ? ' win' : '');
    el.textContent = data.text;
  } else if(data.type === 'challenge') {
    const isChallenger = data.challengerId === currentUser.uid;
    const accepted = data.status === 'accepted';
    // قمنا بتعديل الشرط هنا لكي لا يمكن لصاحب التحدي قبول تحدي نفسه
    const canAccept = !isChallenger && !accepted; 
    el.className = 'challenge-bubble';
    el.innerHTML = `
      <div class="ch-title">⚡ Challenge Duel</div>
      <div class="ch-meta">${data.challengerName} sends a challenge (${data.qCount} Qs · ${data.difficulty})</div>
      ${canAccept ? `<button class="btn-accept-challenge" onclick="acceptChallenge('${id}',this)">Accept Challenge</button>` : ''}
      ${isChallenger && !accepted ? `<div style="font-size:11px;color:var(--muted)">Waiting for opponent...</div>` : ''}
      ${accepted ? `<div style="font-size:11px;color:var(--accent3)">Duel Active!</div>` : ''}
    `;
  } else {
    el.className = 'msg-group';
    const mine = data.uid === currentUser.uid;
    el.innerHTML = `<div class="msg-row ${mine?'mine':''}">
      <img class="msg-avatar" src="${data.avatar||defaultAvatar(data.name)}">
      <div>
        ${!mine ? `<div class="msg-sender">${data.name}</div>` : ''}
        <div class="msg-bubble">${data.text}</div>
      </div>
    </div>`;
  }
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim(); if(!text || !currentRoom) return;
  db.collection('rooms').doc(currentRoom.id).collection('messages').add({
    type: 'chat', text, name: currentUser.name, avatar: currentUser.avatar, uid: currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp()
  });
  input.value = ''; input.style.height = 'auto';
}
function sendSystemMsg(roomId, text, leave=false, win=false) {
  return db.collection('rooms').doc(roomId).collection('messages').add({ type: 'system', text, leave, win, ts: firebase.firestore.FieldValue.serverTimestamp() });
}
function chatKey(e) { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

function listenMembers(roomId) {
  if(membersListener) membersListener();
  membersListener = db.collection('rooms').doc(roomId).collection('members').onSnapshot(snap => {
    membersInRoom = {};
    snap.forEach(doc => { membersInRoom[doc.id] = doc.data(); });
    renderMembers();
  });
}
function renderMembers() {
  const count = Object.keys(membersInRoom).length;
  document.getElementById('membersBadge').textContent = count;
  document.getElementById('chatRoomSub').textContent = `${count} active members`;
  document.getElementById('membersList').innerHTML = Object.values(membersInRoom).map(m => `
    <div class="member-item">
      <img src="${m.avatar||defaultAvatar(m.name)}">
      <div class="m-name">${m.name} ${m.uid===currentUser.uid?'<span class="m-you">(You)</span>':''}</div>
    </div>
  `).join('');
}
function toggleMembers() {
  const p = document.getElementById('membersPanel');
  p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
}

function selectOpt(groupId, btn) {
  document.querySelectorAll(`#${groupId} .ch-option`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function openChallengeSetup() { document.getElementById('challengeSetupModal').classList.add('show'); }
function closeChallengeSetup() { document.getElementById('challengeSetupModal').classList.remove('show'); }
function sendChallenge() {
  const qCount = parseInt(document.querySelector('#qCountOpts .active').dataset.val);
  const difficulty = document.querySelector('#diffOpts .active').dataset.val;
  const category = document.querySelector('#catOpts .active').dataset.val;
  closeChallengeSetup();
  db.collection('rooms').doc(currentRoom.id).collection('messages').add({
    type: 'challenge', challengerId: currentUser.uid, challengerName: currentUser.name,
    qCount, difficulty, category, status: 'open', ts: firebase.firestore.FieldValue.serverTimestamp()
  });
}

function acceptChallenge(docId, btn) {
  btn.disabled = true;
  const ref = db.collection('rooms').doc(currentRoom.id).collection('messages').doc(docId);
  ref.get().then(snap => {
    const data = snap.data();
    if(data.status !== 'open') return;
    ref.update({ status: 'accepted' }).then(() => startQuiz(data));
  });
}

function startQuiz(data) {
  let pool = [...(QUESTIONS_BANK[data.category] || QUESTIONS_BANK.any)];
  pool = pool.sort(() => Math.random()-.5).slice(0, data.qCount);
  quizState = { questions: pool, idx: 0, myScore: 0, oppScore: 0, timer: null, timeLeft: 15, answered: false };
  
  document.getElementById('oppQuizName').textContent = data.challengerName;
  document.getElementById('myScore').textContent = '0';
  document.getElementById('oppScore').textContent = '0';
  document.getElementById('quizOverlay').classList.add('show');
  showQuestion();
}

function showQuestion() {
  if(quizState.idx >= quizState.questions.length) { endQuiz(); return; }
  const q = quizState.questions[quizState.idx];
  document.getElementById('quizLabel').textContent = `Question ${quizState.idx+1} / ${quizState.questions.length}`;
  document.getElementById('quizProgressFill').style.width = ((quizState.idx/quizState.questions.length)*100)+'%';
  document.getElementById('quizQuestion').textContent = q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i) => `<button class="quiz-opt" onclick="answerQuiz(${i})">${o}</button>`).join('');
  quizState.answered = false;
  runTimer();
}

function runTimer() {
  clearInterval(quizState.timer);
  quizState.timeLeft = 15;
  document.getElementById('quizTimer').textContent = quizState.timeLeft;
  quizState.timer = setInterval(() => {
    quizState.timeLeft--;
    document.getElementById('quizTimer').textContent = quizState.timeLeft;
    if(quizState.timeLeft <= 0) { clearInterval(quizState.timer); answerQuiz(-1); }
  }, 1000);
}

function answerQuiz(idx) {
  if(quizState.answered) return; quizState.answered = true;
  clearInterval(quizState.timer);
  const q = quizState.questions[quizState.idx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(b => b.disabled = true);
  if(idx === q.a) {
    if(idx >= 0) opts[idx].classList.add('correct');
    quizState.myScore++;
    document.getElementById('myScore').textContent = quizState.myScore;
  } else {
    if(idx >= 0) opts[idx].classList.add('wrong');
    opts[q.a].classList.add('correct');
  }
  setTimeout(() => { quizState.idx++; showQuestion(); }, 1500);
}

function endQuiz() {
  document.getElementById('quizOverlay').classList.remove('show');
  const msg = `🏆 Trivia finished! Score: ${quizState.myScore} pts`;
  if(currentRoom) sendSystemMsg(currentRoom.id, msg, false, true);
}

window.addEventListener('load', () => { initFirebase(); });
</script>
</body>
</html>
