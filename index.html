<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Challenge | Chat & Trivia Arena</title>
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-panel: #1f2833;
            --accent: #45f3ff;
            --accent-purple: #c5a8ff;
            --text-light: #ffffff;
            --text-muted: #c5c6c7;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Screens Layout */
        .screen {
            display: none;
            flex: 1;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* 1. Login Screen */
        .login-screen-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: var(--bg-panel);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(69, 243, 255, 0.2);
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: var(--accent);
            font-size: 22px;
        }

        /* Device Image Upload Styling */
        .avatar-upload-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            cursor: pointer;
        }

        .avatar-preview {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            background: #11141a;
        }

        .upload-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--accent);
            color: #000;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: #11141a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-google {
            background: #ffffff;
            color: #000;
            margin-top: 10px;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* Header Navigation */
        header {
            background: var(--bg-panel);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            min-height: 60px;
        }

        /* 2. Rooms Screen */
        .rooms-main {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .room-card {
            background: var(--bg-panel);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;
        }

        .room-card h3 {
            color: var(--accent-purple);
            font-size: 16px;
        }

        .room-tag {
            font-size: 11px;
            color: var(--accent);
            font-weight: bold;
            background: rgba(69, 243, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 5px;
        }

        /* 3. Chat Layout */
        .chat-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #11141a;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.incoming {
            background: var(--bg-panel);
            align-self: flex-start;
            border-top-left-radius: 2px;
        }

        .message.outgoing {
            background: #005c4b; 
            align-self: flex-end;
            border-top-right-radius: 2px;
        }

        .message .sender {
            font-size: 11px;
            color: var(--accent);
            margin-bottom: 2px;
            font-weight: bold;
        }

        .message.system-msg {
            background: rgba(197, 168, 255, 0.12);
            color: var(--accent-purple);
            align-self: center;
            max-width: 90%;
            text-align: center;
            border-radius: 8px;
            font-size: 13px;
            border: 1px dashed var(--accent-purple);
        }

        .chat-input-bar {
            background: var(--bg-panel);
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .challenge-btn {
            background: #ff9f43;
            color: black;
            font-size: 18px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }

        /* Sidebar Members Panel */
        .members-sidebar {
            width: 240px;
            background: var(--bg-panel);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            display: none;
        }

        .members-sidebar.active {
            display: block;
        }

        /* Modals Overlays */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--accent);
        }

        /* Simulated Loader */
        .loader-box {
            text-align: center;
            color: var(--accent);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 40px; height: 40px;
            border-radius: 50%;
            border-left-color: var(--accent);
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 4. Quiz Box Area */
        .quiz-container-box {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            flex: 1;
        }

        .quiz-box {
            text-align: center;
            width: 100%;
            max-width: 500px;
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 16px;
            border: 2px solid var(--accent);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        @media(min-width: 480px) { .options-grid { grid-template-columns: 1fr 1fr; } }

        .option-btn {
            background: #11141a;
            color: white;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .option-btn:hover { border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="loginScreen" class="screen active">
        <div class="login-screen-container">
            <div class="login-container">
                <h2>X-Challenge ⚔️</h2>
                <p style="color: var(--text-muted); font-size:13px; margin-bottom:20px;">Upload image and choose nickname</p>
                
                <div class="avatar-upload-container" onclick="document.getElementById('fileInput').click()">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c5c6c7'><path d='M12 12c2.21 0 4-1.79 4-4s1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z'/></svg>" id="avatarPreview" class="avatar-preview">
                    <div class="upload-badge">+</div>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewUserImage(event)">

                <div class="input-group">
                    <label>Username:</label>
                    <input type="text" id="usernameInput" class="form-input" placeholder="e.g., Rayan_Legend">
                </div>
                <button class="btn" onclick="loginPlatform('normal')">Enter Arena</button>
                <button class="btn btn-google" onclick="loginPlatform('gmail')">Continue with Gmail 🔴</button>
            </div>
        </div>
    </div>

    <div id="roomsScreen" class="screen">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="userHeaderAvatar" style="width:32px; height:32px; border-radius:50%; object-fit:cover; border:1px solid var(--accent);">
                <span id="userHeaderName" style="font-weight: bold; font-size:14px;"></span>
            </div>
            <h2 style="color: var(--accent)">Dashboard Rooms</h2>
            <button class="btn" id="createNewRoomBtn" style="width:auto; padding: 6px 12px;" onclick="openModal('createRoomModal')">+ Create Room</button>
        </header>
        <div class="rooms-main">
            <h3 style="font-size: 15px;">Available Rooms</h3>
            <div class="rooms-grid" id="roomsGrid"></div>
        </div>
    </div>

    <div id="chatScreen" class="screen">
        <header>
            <button class="btn" style="width:auto; background:#333; color:white; padding: 6px 12px;" onclick="leaveRoom()">⬅ Back</button>
            <h2 id="currentRoomTitle" style="color: var(--accent-purple)">Room</h2>
            <div id="headerActionArea"></div>
        </header>
        <div class="chat-container">
            <div class="chat-main">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-bar">
                    <button class="challenge-btn" onclick="openModal('challengeSettingsModal')">⚔️</button>
                    <input type="text" id="chatInputField" class="form-input" placeholder="Type a message...">
                    <button class="btn" style="width:auto;" onclick="sendChatMessage()">Send</button>
                </div>
            </div>
            <div class="members-sidebar" id="membersSidebar">
                <h3 style="font-size:14px; margin-bottom:10px;">Room Members</h3>
                <div id="sidebarMembersList"></div>
            </div>
        </div>
    </div>

    <div id="quizScreen" class="screen">
        <div class="quiz-container-box">
            <div class="quiz-box">
                <div style="display:flex; justify-content: space-between; margin-bottom: 15px; color: var(--accent); font-size:13px;">
                    <span id="quizProgress">Question: 1</span>
                    <span id="quizScore">Score: 0</span>
                </div>
                <h2 id="questionText" style="margin-bottom: 20px;">Question?</h2>
                <div class="options-grid" id="optionsGrid"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="createRoomModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; color: var(--accent);">Setup Your Room</h3>
            <div class="input-group">
                <label>Room Name:</label>
                <input type="text" id="roomNameInput" class="form-input" placeholder="e.g., Tactical Discussion">
            </div>
            <div class="input-group">
                <label>Max Members (Min 2 - Max 15):</label>
                <input type="number" id="roomMaxPlayers" class="form-input" value="10" min="2" max="15">
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="createNewRoom()">Confirm</button>
                <button class="btn" style="background:#444; color:white;" onclick="closeModal('createRoomModal')">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="challengeSettingsModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; color: #ff9f43;">⚔️ Challenge Settings</h3>
            <div class="input-group">
                <label>Questions Count:</label>
                <select id="quizCountSelect" class="form-input">
                    <option value="3">3 Questions (Speed Match)</option>
                    <option value="5">5 Questions (Standard Match)</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#ff9f43; color:black;" onclick="sendChallengeMessage()">Deploy Challenge</button>
                <button class="btn" style="background:#444; color:white;" onclick="closeModal('challengeSettingsModal')">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="gmailLoadingModal">
        <div class="modal-content loader-box">
            <div class="spinner"></div>
            <h3>Connecting Securely to Gmail...</h3>
        </div>
    </div>

    <script>
        let currentUser = { name: "", avatar: "" };
        let activeRoomId = null;
        let hasCreatedRoom = false; // Restriction flag

        let roomsList = [
            { id: "101", name: "Global Trivia Lounge 🧠", max: 15, current: 1, creator: "System_Bot" }
        ];

        const quizDatabase = [
            { q: "Which planet is known as the Red Planet?", options: ["Venus", "Mars", "Jupiter", "Mercury"], correct: 1 },
            { q: "What is the capital city of France?", options: ["London", "Berlin", "Paris", "Madrid"], correct: 2 },
            { q: "How many continents exist on Earth?", options: ["5", "6", "7", "8"], correct: 2 }
        ];

        let currentQuizIndex = 0;
        let currentScore = 0;
        let selectedTotalQs = 3;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('remove'); document.getElementById(id).classList.remove('active'); }

        // Preview local uploaded image file
        function previewUserImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('avatarPreview');
                output.src = reader.result;
                currentUser.avatar = reader.result; // Saved as base64 string
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function loginPlatform(method) {
            if (method === 'gmail') {
                openModal('gmailLoadingModal');
                setTimeout(() => {
                    closeModal('gmailLoadingModal');
                    currentUser.name = "Google_User_" + Math.floor(100 + Math.random() * 900);
                    if (!currentUser.avatar) {
                        currentUser.avatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2345f3ff'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>";
                    }
                    proceedToDashboard();
                }, 1800);
            } else {
                const nameIn = document.getElementById('usernameInput').value.trim();
                if (!nameIn) return alert("Please type a username!");
                currentUser.name = nameIn;
                if (!currentUser.avatar) {
                    currentUser.avatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c5a8ff'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>";
                }
                proceedToDashboard();
            }
        }

        function proceedToDashboard() {
            document.getElementById('userHeaderAvatar').src = currentUser.avatar;
            document.getElementById('userHeaderName').innerText = currentUser.name;
            renderRoomsGrid();
            showScreen('roomsScreen');
        }

        function renderRoomsGrid() {
            const grid = document.getElementById('roomsGrid');
            grid.innerHTML = "";
            roomsList.forEach(room => {
                const isOwner = room.creator === currentUser.name;
                grid.innerHTML += `
                    <div class="room-card" id="card_${room.id}">
                        <div>
                            ${isOwner ? '<span class="room-tag">My Created Room</span>' : ''}
                            <h3>${room.name}</h3>
                            <p style="color: var(--text-muted); font-size:12px; margin-top:5px;">Capacity: ${room.current}/${room.max}</p>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn" style="padding:6px 12px;" onclick="joinRoomAction('${room.id}')">Join</button>
                            ${isOwner ? `<button class="btn btn-danger" style="padding:6px 12px;" onclick="destroyRoom('${room.id}')">Delete</button>` : ''}
                        </div>
                    </div>
                `;
            });

            // Enforce single room creation rule visuals
            const createBtn = document.getElementById('createNewRoomBtn');
            if (hasCreatedRoom) {
                createBtn.style.opacity = "0.5";
                createBtn.title = "You can only maintain 1 active room.";
            } else {
                createBtn.style.opacity = "1";
                createBtn.title = "";
            }
        }

        function createNewRoom() {
            if (hasCreatedRoom) {
                closeModal('createRoomModal');
                return alert("Violation: You are restricted to exactly one active custom room!");
            }

            const name = document.getElementById('roomNameInput').value.trim();
            let maxVal = parseInt(document.getElementById('roomMaxPlayers').value);

            if (!name) return alert("Please declare a room name!");
            
            // Enforce capacity bounds strictly: 2 to 15
            if (isNaN(maxVal) || maxVal < 2) maxVal = 2;
            if (maxVal > 15) maxVal = 15;

            const newId = Date.now().toString();
            const newRoom = { id: newId, name: name, max: maxVal, current: 1, creator: currentUser.name };
            
            roomsList.push(newRoom);
            hasCreatedRoom = true;
            closeModal('createRoomModal');
            renderRoomsGrid();
        }

        function destroyRoom(id) {
            roomsList = roomsList.filter(r => r.id !== id);
            hasCreatedRoom = false;
            renderRoomsGrid();
            if (activeRoomId === id) {
                showScreen('roomsScreen');
                alert("The room you were in was closed by the owner.");
            }
        }

        function joinRoomAction(id) {
            activeRoomId = id;
            const room = roomsList.find(r => r.id === id);
            document.getElementById('currentRoomTitle').innerText = room.name;

            // Header Action Area setup for clean dynamic deletion inside chat
            const actionArea = document.getElementById('headerActionArea');
            if (room.creator === currentUser.name) {
                actionArea.innerHTML = `<button class="btn btn-danger" style="padding: 6px 12px;" onclick="destroyRoom('${room.id}')">Terminate Room</button>`;
            } else {
                actionArea.innerHTML = `<button class="btn" style="width:auto; padding: 6px 12px;" onclick="document.getElementById('membersSidebar').classList.toggle('active')">👥 View Active</button>`;
            }

            document.getElementById('chatMessages').innerHTML = `<div class="message system-msg">Welcome to ${room.name}. Let the matches begin!</div>`;
            
            // Render basic sidebar members dynamically
            document.getElementById('sidebarMembersList').innerHTML = `
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                    <img src="${currentUser.avatar}" style="width:24px; height:24px; border-radius:50%; object-fit:cover;">
                    <span style="font-size:13px;">${currentUser.name} (You)</span>
                </div>
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                    <span style="font-size:18px;">🤖</span><span style="font-size:13px;">Matchmaking_Bot</span>
                </div>
            `;

            showScreen('chatScreen');
        }

        function leaveRoom() {
            activeRoomId = null;
            showScreen('roomsScreen');
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInputField');
            const txt = input.value.trim();
            if (!txt) return;

            appendMsgBox(currentUser.name, txt, 'outgoing');
            input.value = "";
        }

        function appendMsgBox(sender, text, structureType) {
            const container = document.getElementById('chatMessages');
            const el = document.createElement('div');
            el.className = `message ${structureType}`;
            if (structureType !== 'system-msg') {
                el.innerHTML = `<div class="sender">${sender}</div><div>${text}</div>`;
            } else {
                el.innerHTML = text;
            }
            container.appendChild(el);
            container.scrollTop = container.scrollHeight;
        }

        function sendChallengeMessage() {
            closeModal('challengeSettingsModal');
            selectedTotalQs = parseInt(document.getElementById('quizCountSelect').value);

            appendMsgBox("SYSTEM MATCH", `${currentUser.name} queued up a Live Quiz Challenge!`, 'system-msg');

            const container = document.getElementById('chatMessages');
            const challengeWidget = document.createElement('div');
            challengeWidget.style.cssText = "background:#1f2833; padding:12px; border-radius:8px; text-align:center; margin:10px auto; border:1px solid #ff9f43; width:100%; max-width:280px;";
            challengeWidget.innerHTML = `
                <p style="font-size:12px; margin-bottom:8px;">Match Request (${selectedTotalQs} Questions) by ${currentUser.name}</p>
                <button class="btn" style="background:#ff9f43; color:black; font-size:12px; padding:4px 10px;" onclick="interceptChallengeAccept(this, '${currentUser.name}')">Accept Challenge</button>
            `;
            container.appendChild(challengeWidget);
            container.scrollTop = container.scrollHeight;
        }

        // Logic check: Intercepting self-challenges strictly
        function interceptChallengeAccept(element, authorName) {
            if (currentUser.name === authorName) {
                alert("Operation Denied: You cannot accept or play your own challenge card! Please await an opponent.");
                return;
            }
            element.parentElement.remove();
            triggerQuizGameplay();
        }

        function triggerQuizGameplay() {
            currentQuizIndex = 0;
            currentScore = 0;
            showScreen('quizScreen');
            loadNextQuizQuestion();
        }

        function loadNextQuizQuestion() {
            if (currentQuizIndex >= selectedTotalQs || currentQuizIndex >= quizDatabase.length) {
                terminateQuizSession();
                return;
            }

            document.getElementById('quizProgress').innerText = `Question: ${currentQuizIndex + 1} of ${selectedTotalQs}`;
            document.getElementById('quizScore').innerText = `Score: ${currentScore}`;

            const activeQ = quizDatabase[currentQuizIndex];
            document.getElementById('questionText').innerText = activeQ.q;

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = "";
            activeQ.options.forEach((opt, idx) => {
                grid.innerHTML += `<button class="option-btn" onclick="evaluateSelection(${idx})">${opt}</button>`;
            });
        }

        function evaluateSelection(chosenIdx) {
            if (chosenIdx === quizDatabase[currentQuizIndex].correct) {
                currentScore += 10;
            }
            currentQuizIndex++;
            loadNextQuizQuestion();
        }

        function terminateQuizSession() {
            showScreen('chatScreen');
            appendMsgBox("🏆 COMPETITION REPORT", `🎉 Match Completed! Player ${currentUser.name} secured the leaderboard with ${currentScore} points! 🔥`, 'system-msg');
        }

        document.getElementById('chatInputField').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') sendChatMessage();
        });
    </script>
</body>
</html>
